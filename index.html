<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blind Timer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="timer-app" aria-live="polite">
      <div id="targetControls" class="target-controls">
        <label for="targetInput">TARGET</label>
        <input
          id="targetInput"
          class="target-input"
          type="text"
          inputmode="decimal"
          autocomplete="off"
          placeholder="01:30.00"
        >
      </div>

      <button id="startStopButton" class="primary-button" type="button">
        START
      </button>

      <div id="revealPanel" class="reveal-panel" hidden>
        <div class="target-readout">
          TARGET <span id="targetDisplay">--:--.--</span>
        </div>
        <div id="secretTimer" class="secret-timer">00:00.00</div>
        <div id="deltaDisplay" class="delta-display">DELTA --:--.--</div>
      </div>
    </main>

    <button id="resetButton" class="corner-button reset-button" type="button">
      Reset
    </button>

    <button id="revealButton" class="corner-button reveal-button" type="button">
      Reveal
    </button>

    <script src="script.js"></script>
  </body>
</html>
