<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blind Timer</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="timer-app" aria-live="polite">
      <div id="targetControls" class="target-controls">
        <div class="target-label">TARGET</div>
        <div class="target-picker" aria-label="Target time">
          <div class="target-unit">
            <button class="target-adjust" type="button" data-target-unit="minutes" data-change="1" aria-label="Add one minute">+</button>
            <div id="targetMinutes" class="target-value">00</div>
            <button class="target-adjust" type="button" data-target-unit="minutes" data-change="-1" aria-label="Remove one minute">-</button>
            <div class="target-unit-label">MIN</div>
          </div>

          <div class="target-separator">:</div>

          <div class="target-unit">
            <button class="target-adjust" type="button" data-target-unit="seconds" data-change="1" aria-label="Add one second">+</button>
            <div id="targetSeconds" class="target-value">00</div>
            <button class="target-adjust" type="button" data-target-unit="seconds" data-change="-1" aria-label="Remove one second">-</button>
            <div class="target-unit-label">SEC</div>
          </div>

          <div class="target-separator">.</div>

          <div class="target-unit">
            <button class="target-adjust" type="button" data-target-unit="hundredths" data-change="1" aria-label="Add one hundredth">+</button>
            <div id="targetHundredths" class="target-value">00</div>
            <button class="target-adjust" type="button" data-target-unit="hundredths" data-change="-1" aria-label="Remove one hundredth">-</button>
            <div class="target-unit-label">MS</div>
          </div>
        </div>
      </div>

      <button id="startStopButton" class="primary-button" type="button">
        START
      </button>

      <div id="revealPanel" class="reveal-panel" hidden>
        <div class="target-readout">
          TARGET <span id="targetDisplay">--:--.--</span>
        </div>
        <div id="secretTimer" class="secret-timer">00:00.00</div>
        <div id="deltaDisplay" class="delta-display">0:00.00 OFF</div>
      </div>
    </main>

    <button id="resetButton" class="corner-button reset-button" type="button">
      Reset
    </button>

    <button id="revealButton" class="corner-button reveal-button" type="button">
      Reveal
    </button>

    <script src="script.js"></script>
  </body>
</html>
